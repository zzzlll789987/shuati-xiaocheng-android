<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>小澄记账</title>
<style>
:root{--bg:#f6f8f7;--card:#fff;--ink:#10201d;--muted:#66736f;--line:#dce5e2;--brand:#0f766e;--soft:#e6f5f1;--red:#c2410c;--green:#15803d}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#dff3ef,transparent 260px),var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}.app{max-width:720px;margin:0 auto;padding:18px 14px 36px}h1,h2,p{margin:0}h1{font-size:34px;line-height:1.1}.sub{margin-top:6px;color:var(--muted)}.top{padding:16px 0}.balance{margin-top:18px;padding:22px;border-radius:10px;background:var(--brand);color:#fff}.balance span{opacity:.82}.balance strong{display:block;margin-top:8px;font-size:38px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}.stat,.panel{background:var(--card);border:1px solid var(--line);border-radius:10px}.stat{padding:13px}.stat span,label,small{font-size:13px;color:var(--muted)}.stat strong{display:block;margin-top:6px;font-size:18px}.panel{margin-top:14px;padding:16px}.row,.head,.item,.actions{display:flex;align-items:center;gap:10px}.head,.item{justify-content:space-between}.tabs{display:grid;grid-template-columns:1fr 1fr;width:148px;padding:3px;border-radius:8px;background:#edf3f1}.tab{height:34px;border:0;border-radius:6px;background:transparent;color:var(--muted);font-weight:800}.tab.on{background:#fff;color:var(--brand)}form{display:grid;gap:12px;margin-top:14px}input,select,button{font:inherit}input,select{width:100%;height:46px;border:1px solid var(--line);border-radius:8px;padding:0 12px;background:#fbfdfc;color:var(--ink)}label{display:grid;gap:7px;font-weight:700}.row label{flex:1;min-width:0}.primary{height:46px;border:0;border-radius:8px;background:var(--brand);color:#fff;font-weight:800}.ghost{display:inline-flex;align-items:center;justify-content:center;width:86px;height:42px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--brand);font-size:14px;font-weight:800;padding:0}.search{flex:1;min-width:0}.list{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}.item{padding:15px 16px;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}.main{min-width:0}.tag{display:inline-block;padding:4px 8px;border-radius:6px;background:var(--soft);color:var(--brand);font-size:12px;font-weight:800}.note{display:block;margin-top:6px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.money{font-weight:900}.money.expense{color:var(--red)}.money.income{color:var(--green)}.del{margin-top:8px;height:28px;border:0;border-radius:6px;background:#f1f5f4;color:var(--muted);font-size:12px}.empty{padding:40px 20px;text-align:center;color:var(--muted)}.listMore{padding:12px;border-top:1px solid var(--line);background:#fbfdfc}.toggleList{width:100%;height:42px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--brand);font-size:14px;font-weight:800}@media(min-width:720px){.app{padding-top:28px}.topgrid{display:grid;grid-template-columns:1fr 1.2fr;gap:16px;align-items:end}.balance{margin-top:0}}
</style>
</head>
<body>
<main class="app">
<section class="top topgrid"><div><h1>小澄记账</h1><p class="sub">手机本地保存，点开就能记</p></div><div><div class="balance"><span>本月结余</span><strong id="bal">¥0.00</strong><span id="monthLabel">-</span></div><div class="stats"><div class="stat"><span>收入</span><strong id="inc">¥0.00</strong></div><div class="stat"><span>支出</span><strong id="exp">¥0.00</strong></div><div class="stat"><span>记录</span><strong id="cnt">0</strong></div></div></div></section>
<section class="panel"><div class="head"><h2>新增一笔</h2><div class="tabs"><button id="expenseTab" class="tab on" type="button">支出</button><button id="incomeTab" class="tab" type="button">收入</button></div></div><form id="entryForm"><label>金额<input id="amount" inputmode="decimal" placeholder="0.00" required></label><div class="row"><label>分类<select id="cat"></select></label><label>日期<input id="date" type="date" required></label></div><label>备注<input id="note" maxlength="32" placeholder="例如 早餐、工资、地铁"></label><button class="primary" type="submit">保存记录</button></form></section>
<section class="panel"><div class="head"><h2>账单</h2><select id="month"></select></div><div class="actions" style="margin-top:12px"><input id="q" class="search" placeholder="搜索分类或备注"><button id="exportBtn" class="ghost" type="button">导出表格</button></div></section>
<section class="list"><div id="empty" class="empty">还没有记录，先保存一笔账。</div><div id="list"></div></section>
</main>
<script>
(function(){
'use strict';
const KEY='xc-ledger-v3';
const categoryOptions=['买菜','水果','零食','购物','交通','水电','旅游','就餐','杂项'];
const LIST_LIMIT=8;
let entryType='expense';
let entries=[];
let monthFilter='all';
let searchText='';
let listExpanded=false;
const ui={
  bal:document.getElementById('bal'),inc:document.getElementById('inc'),exp:document.getElementById('exp'),cnt:document.getElementById('cnt'),monthLabel:document.getElementById('monthLabel'),
  expenseTab:document.getElementById('expenseTab'),incomeTab:document.getElementById('incomeTab'),form:document.getElementById('entryForm'),amount:document.getElementById('amount'),cat:document.getElementById('cat'),date:document.getElementById('date'),note:document.getElementById('note'),
  month:document.getElementById('month'),q:document.getElementById('q'),exportBtn:document.getElementById('exportBtn'),empty:document.getElementById('empty'),list:document.getElementById('list')
};
function today(){return new Date().toISOString().slice(0,10)}
function monthKey(date){return String(date||'').slice(0,7)}
function money(num){return new Intl.NumberFormat('zh-CN',{style:'currency',currency:'CNY'}).format(num||0)}
function escapeHtml(value){return String(value||'').replace(/[&<>"]/g,match=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[match]))}
function csvCell(value){const text=String(value==null?'':value).replace(/"/g,'""');return '"'+text+'"'}
function load(){try{entries=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){entries=[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(entries))}
function fillCategories(){ui.cat.innerHTML=categoryOptions.map(name=>'<option value="'+name+'">'+name+'</option>').join('')}
function setEntryType(type){entryType=type;ui.expenseTab.classList.toggle('on',type==='expense');ui.incomeTab.classList.toggle('on',type==='income');ui.amount.focus()}
function fillMonths(){const months=[...new Set(entries.map(item=>monthKey(item.date)).filter(Boolean))].sort().reverse();const old=monthFilter;ui.month.innerHTML='<option value="all">全部月份</option>'+months.map(m=>'<option value="'+m+'">'+m+'</option>').join('');ui.month.value=months.includes(old)?old:'all';monthFilter=ui.month.value}
function filteredEntries(){return entries.filter(item=>monthFilter==='all'||monthKey(item.date)===monthFilter).filter(item=>{const text=(item.category+' '+item.note).toLowerCase();return text.includes(searchText.toLowerCase())}).sort((a,b)=>String(b.date).localeCompare(String(a.date))||b.createdAt-a.createdAt)}
function summaryEntries(){const selected=monthFilter==='all'?monthKey(today()):monthFilter;return entries.filter(item=>monthKey(item.date)===selected)}
function renderSummary(){const data=summaryEntries();const income=data.filter(item=>item.type==='income').reduce((sum,item)=>sum+item.amount,0);const expense=data.filter(item=>item.type==='expense').reduce((sum,item)=>sum+item.amount,0);ui.bal.textContent=money(income-expense);ui.inc.textContent=money(income);ui.exp.textContent=money(expense);ui.cnt.textContent=String(data.length);ui.monthLabel.textContent=(monthFilter==='all'?monthKey(today()):monthFilter)+' 月'}
function itemHtml(item){return '<article class="item"><div class="main"><span class="tag">'+escapeHtml(item.category)+'</span><strong class="note">'+escapeHtml(item.note||'记账')+'</strong><small>'+escapeHtml(item.date)+'</small></div><div style="text-align:right"><div class="money '+item.type+'">'+(item.type==='income'?'+':'-')+money(item.amount)+'</div><button class="del" type="button" data-id="'+item.id+'">删除</button></div></article>'}
function renderList(){const data=filteredEntries();const visible=listExpanded?data:data.slice(0,LIST_LIMIT);ui.empty.style.display=data.length?'none':'block';let html=visible.map(itemHtml).join('');if(data.length>LIST_LIMIT){html+='<div class="listMore"><button id="toggleList" class="toggleList" type="button">'+(listExpanded?'收起':'展开全部 '+data.length+' 条')+'</button></div>'}ui.list.innerHTML=html}
function render(){fillMonths();renderSummary();renderList()}
function addEntry(event){event.preventDefault();const amount=Number(String(ui.amount.value).replace(',','.'));if(!Number.isFinite(amount)||amount<=0){ui.amount.focus();return}entries.push({id:String(Date.now())+Math.random().toString(16).slice(2),type:entryType,amount:amount,category:ui.cat.value,date:ui.date.value||today(),note:ui.note.value.trim(),createdAt:Date.now()});save();ui.form.reset();ui.date.value=today();fillCategories();listExpanded=false;render()}
function deleteEntry(id){entries=entries.filter(item=>item.id!==id);save();render()}
function exportCsv(){const data=filteredEntries();const header=['日期','类型','分类','金额','备注'];const rows=data.map(item=>[item.date,item.type==='income'?'收入':'支出',item.category,item.amount,item.note||'']);const csv='\ufeff'+[header].concat(rows).map(row=>row.map(csvCell).join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='xiaocheng-ledger-'+today()+'.csv';a.click();URL.revokeObjectURL(url)}
ui.expenseTab.addEventListener('click',()=>setEntryType('expense'));
ui.incomeTab.addEventListener('click',()=>setEntryType('income'));
ui.form.addEventListener('submit',addEntry);
ui.month.addEventListener('change',()=>{monthFilter=ui.month.value;listExpanded=false;renderSummary();renderList()});
ui.q.addEventListener('input',()=>{searchText=ui.q.value;listExpanded=false;renderList()});
ui.list.addEventListener('click',event=>{if(event.target.classList.contains('del'))deleteEntry(event.target.dataset.id);if(event.target.id==='toggleList'){listExpanded=!listExpanded;renderList()}});
ui.exportBtn.addEventListener('click',exportCsv);
load();ui.date.value=today();fillCategories();setEntryType('expense');render();
})();
</script>
</body>
</html>
