<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>&#23567;&#28548;&#35760;&#36134;</title>
<style>
:root{--bg:#f6f8f7;--card:#fff;--ink:#10201d;--muted:#66736f;--line:#dce5e2;--brand:#0f766e;--soft:#e6f5f1;--red:#c2410c;--green:#15803d}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#dff3ef,transparent 260px),var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}.app{max-width:720px;margin:0 auto;padding:18px 14px 36px}h1,h2,p{margin:0}h1{font-size:34px;line-height:1.1}.sub{margin-top:6px;color:var(--muted)}.top{padding:16px 0}.balance{margin-top:18px;padding:22px;border-radius:10px;background:var(--brand);color:white}.balance span{opacity:.82}.balance strong{display:block;margin-top:8px;font-size:38px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}.stat,.panel{background:var(--card);border:1px solid var(--line);border-radius:10px}.stat{padding:13px}.stat span,label,small{font-size:13px;color:var(--muted)}.stat strong{display:block;margin-top:6px;font-size:18px}.panel{margin-top:14px;padding:16px}.row,.head,.item,.actions{display:flex;align-items:center;gap:10px}.head,.item{justify-content:space-between}.tabs{display:grid;grid-template-columns:1fr 1fr;width:148px;padding:3px;border-radius:8px;background:#edf3f1}.tab{height:34px;border:0;border-radius:6px;background:transparent;color:var(--muted);font-weight:800}.tab.on{background:white;color:var(--brand)}form{display:grid;gap:12px;margin-top:14px}input,select,button{font:inherit}input,select{width:100%;height:46px;border:1px solid var(--line);border-radius:8px;padding:0 12px;background:#fbfdfc;color:var(--ink)}label{display:grid;gap:7px;font-weight:700}.row label{flex:1;min-width:0}.primary{height:46px;border:0;border-radius:8px;background:var(--brand);color:white;font-weight:800}.ghost{height:42px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--brand);font-weight:800;padding:0 12px}.search{flex:1;min-width:0}.list{margin-top:14px;background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden}.item{padding:15px 16px;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}.main{min-width:0}.tag{display:inline-block;padding:4px 8px;border-radius:6px;background:var(--soft);color:var(--brand);font-size:12px;font-weight:800}.note{display:block;margin-top:6px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.money{font-weight:900}.money.expense{color:var(--red)}.money.income{color:var(--green)}.del{margin-top:8px;height:28px;border:0;border-radius:6px;background:#f1f5f4;color:var(--muted);font-size:12px}.empty{padding:40px 20px;text-align:center;color:var(--muted)}.file{position:relative;overflow:hidden}.file input{position:absolute;inset:0;opacity:0}@media(min-width:720px){.app{padding-top:28px}.topgrid{display:grid;grid-template-columns:1fr 1.2fr;gap:16px;align-items:end}.balance{margin-top:0}}
</style>
</head>
<body>
<main class="app">
<section class="top topgrid"><div><h1>&#23567;&#28548;&#35760;&#36134;</h1><p class="sub">&#25163;&#26426;&#26412;&#22320;&#20445;&#23384;&#65292;&#28857;&#24320;&#23601;&#33021;&#35760;</p></div><div><div class="balance"><span>&#26412;&#26376;&#32467;&#20313;</span><strong id="bal">¥0.00</strong><span id="monthLabel">-</span></div><div class="stats"><div class="stat"><span>&#25910;&#20837;</span><strong id="inc">¥0.00</strong></div><div class="stat"><span>&#25903;&#20986;</span><strong id="exp">¥0.00</strong></div><div class="stat"><span>&#35760;&#24405;</span><strong id="cnt">0</strong></div></div></div></section>
<section class="panel"><div class="head"><h2>&#26032;&#22686;&#19968;&#31508;</h2><div class="tabs"><button class="tab on" data-type="expense">&#25903;&#20986;</button><button class="tab" data-type="income">&#25910;&#20837;</button></div></div><form id="form"><label>&#37329;&#39069;<input id="amount" inputmode="decimal" placeholder="0.00" required></label><div class="row"><label>&#20998;&#31867;<select id="cat"></select></label><label>&#26085;&#26399;<input id="date" type="date" required></label></div><label>&#22791;&#27880;<input id="note" maxlength="32" placeholder="&#20363;&#22914; &#26089;&#39184;&#12289;&#24037;&#36164;&#12289;&#22320;&#38081;"></label><button class="primary">&#20445;&#23384;&#35760;&#24405;</button></form></section>
<section class="panel"><div class="head"><h2>&#36134;&#21333;</h2><select id="month"></select></div><div class="actions" style="margin-top:12px"><input id="q" class="search" placeholder="&#25628;&#32034;&#20998;&#31867;&#25110;&#22791;&#27880;"><button id="export" class="ghost">&#23548;&#20986;</button><label class="ghost file">&#23548;&#20837;<input id="import" type="file" accept="application/json"></label></div></section>
<section class="list"><div id="empty" class="empty">&#36824;&#27809;&#26377;&#35760;&#24405;&#65292;&#20808;&#20445;&#23384;&#19968;&#31508;&#36134;&#12290;</div><div id="list"></div></section>
</main>
<script>
const KEY='xc-ledger-v2';
const names={expense:['\u9910\u996e','\u4ea4\u901a','\u8d2d\u7269','\u5c45\u4f4f','\u5b66\u4e60','\u533b\u7597','\u5a31\u4e50','\u5176\u4ed6'],income:['\u5de5\u8d44','\u5956\u91d1','\u526f\u4e1a','\u7ea2\u5305','\u7406\u8d22','\u9000\u6b3e','\u5176\u4ed6']};
let type='expense',items=[],filter='all',query='';
const $=s=>document.querySelector(s);const money=n=>new Intl.NumberFormat('zh-CN',{style:'currency',currency:'CNY'}).format(n);const today=()=>new Date().toISOString().slice(0,10);const mkey=d=>d.slice(0,7);
function load(){try{items=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){items=[]}}function save(){localStorage.setItem(KEY,JSON.stringify(items))}
function cats(){cat.innerHTML=names[type].map(x=>`<option>${x}</option>`).join('')}
function setType(t){type=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.type===t));cats()}
function months(){let ms=[...new Set(items.map(x=>mkey(x.date)))].sort().reverse();month.innerHTML='<option value="all">\u5168\u90e8\u6708\u4efd</option>'+ms.map(x=>`<option value="${x}">${x}</option>`).join('');month.value=ms.includes(filter)?filter:'all';filter=month.value}
function scoped(){return items.filter(x=>filter==='all'||mkey(x.date)===filter).filter(x=>(x.cat+' '+x.note).toLowerCase().includes(query.toLowerCase())).sort((a,b)=>b.date.localeCompare(a.date)||b.t-a.t)}
function monthItems(){let m=filter==='all'?mkey(today()):filter;return items.filter(x=>mkey(x.date)===m)}
function render(){months();let mi=monthItems(),i=mi.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0),e=mi.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);bal.textContent=money(i-e);inc.textContent=money(i);exp.textContent=money(e);cnt.textContent=mi.length;monthLabel.textContent=(filter==='all'?mkey(today()):filter)+' \u6708';let vs=scoped();empty.style.display=vs.length?'none':'block';list.innerHTML=vs.map(x=>`<article class="item"><div class="main"><span class="tag">${x.cat}</span><strong class="note">${x.note||('\u8bb0\u8d26')}</strong><small>${x.date}</small></div><div style="text-align:right"><div class="money ${x.type}">${x.type==='income'?'+':'-'}${money(x.amount)}</div><button class="del" data-id="${x.id}">\u5220\u9664</button></div></article>`).join('')}
form.onsubmit=e=>{e.preventDefault();let a=Number(amount.value.replace(',','.'));if(!a||a<=0)return amount.focus();items.push({id:String(Date.now())+Math.random(),type,amount:a,cat:cat.value,date:date.value,note:note.value.trim(),t:Date.now()});save();form.reset();date.value=today();cats();render()};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setType(b.dataset.type));month.onchange=()=>{filter=month.value;render()};q.oninput=()=>{query=q.value;render()};list.onclick=e=>{if(e.target.className==='del'){items=items.filter(x=>x.id!==e.target.dataset.id);save();render()}};
export.onclick=()=>{let blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='xiaocheng-ledger-'+today()+'.json';a.click();URL.revokeObjectURL(u)};
import.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result);if(Array.isArray(data)){items=data.concat(items);save();render()}}catch(err){alert('\u6587\u4ef6\u65e0\u6cd5\u5bfc\u5165')}};r.readAsText(f)};
load();date.value=today();setType('expense');render();
</script>
</body>
</html>
